const RUN_TYPES = ["Zone 2", "Long Run", "Threshold", "Hills", "Recovery", "Race"];

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const epley = (w, r) => w * (1 + r / 30);
const fmtDate = (iso) => new Date(iso).toLocaleDateString("en-AU", { weekday: "short", day: "numeric", month: "short" });
const startOfWeek = (d) => {
  const x = new Date(d);
  const day = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - day);
  x.setHours(0, 0, 0, 0);
  return x;
};

const DEFAULT_DATA = { blocks: [BLOCK_1, CYCLE_2_A, CYCLE_2_B, CYCLE_2_C], activeBlockId: "b1", workouts: [], runs: [] };

function loadInitial() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
    // migrate v1 (single program) if present
    const legacy = localStorage.getItem(LEGACY_KEY);
    if (legacy) {
      const old = JSON.parse(legacy);
      const b1 = { ...(old.program || BLOCK_1), id: "b1", archived: false };
      return {
        blocks: [b1, CYCLE_2_A, CYCLE_2_B, CYCLE_2_C],
        activeBlockId: "b1",
        workouts: (old.workouts || []).map((w) => ({ ...w, blockId: "b1" })),
        runs: old.runs || [],
      };
    }
    return DEFAULT_DATA;
  } catch {
    return DEFAULT_DATA;
  }
}

function App() {
  const [data, setData] = useState(null);
  const [saveErr, setSaveErr] = useState(false);
  const [tab, setTab] = useState("today");
  const [active, setActive] = useState(null);
  const [runForm, setRunForm] = useState(null);
  const [toast, setToast] = useState("");
  const [progressEx, setProgressEx] = useState("tbdl");
  const [openHistory, setOpenHistory] = useState({});
  const [openBlocks, setOpenBlocks] = useState({});
  const [dataModal, setDataModal] = useState(null); // {mode:'export'|'import'|'addblock', text}

  useEffect(() => { setData(loadInitial()); }, []);

  const persist = (next) => {
    setData(next);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      setSaveErr(false);
    } catch {
      setSaveErr(true);
    }
  };

  const flash = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2400);
  };

  const activeBlock = data ? data.blocks.find((b) => b.id === data.activeBlockId) : null;

  /* derived */
  const weekStats = useMemo(() => {
    if (!data) return { km: 0, lifts: 0, runs: 0, days: [] };
    const ws = startOfWeek(new Date());
    const inWeek = (iso) => new Date(iso) >= ws;
    const runs = data.runs.filter((r) => inWeek(r.date));
    const lifts = data.workouts.filter((w) => inWeek(w.date));
    const days = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(ws);
      d.setDate(d.getDate() + i);
      const key = d.toDateString();
      return {
        label: "MTWTFSS"[i],
        hasLift: lifts.some((w) => new Date(w.date).toDateString() === key),
        hasRun: runs.some((r) => new Date(r.date).toDateString() === key),
        isToday: key === new Date().toDateString(),
      };
    });
    return {
      km: runs.reduce((s, r) => s + (parseFloat(r.km) || 0), 0),
      lifts: lifts.length,
      runs: runs.length,
      days,
    };
  }, [data]);

  const lastEntriesFor = (sessionId) => {
    if (!data || !activeBlock) return null;
    const prev = [...data.workouts]
      .filter((w) => w.blockId === activeBlock.id && w.sessionId === sessionId)
      .sort((a, b) => new Date(b.date) - new Date(a.date))[0];
    return prev ? prev.entries : null;
  };

  /* workout flow */
  const startWorkout = (session) => {
    const entries = {};
    session.exercises.forEach((ex) => {
      entries[ex.id] = Array.from({ length: ex.sets }, () => ({ w: "", r: "", rpe: "", done: false }));
    });
    setActive({ blockId: activeBlock.id, sessionId: session.id, entries });
  };

  const updateSet = (exId, i, field, val) => {
    setActive((a) => ({
      ...a,
      entries: { ...a.entries, [exId]: a.entries[exId].map((s, j) => (j === i ? { ...s, [field]: val } : s)) },
    }));
  };

  const addSet = (exId) => {
    setActive((a) => ({ ...a, entries: { ...a.entries, [exId]: [...a.entries[exId], { w: "", r: "", rpe: "", done: false }] } }));
  };

  const finishWorkout = () => {
    const filled = Object.values(active.entries).some((sets) => sets.some((s) => s.r || s.w));
    if (!filled) { flash("Log at least one set first"); return; }
    const cleaned = {};
    Object.entries(active.entries).forEach(([exId, sets]) => {
      const kept = sets.filter((s) => s.r || s.w);
      if (kept.length) cleaned[exId] = kept.map(({ w, r, rpe }) => ({ w, r, rpe }));
    });
    persist({
      ...data,
      workouts: [...data.workouts, { id: uid(), date: new Date().toISOString(), blockId: active.blockId, sessionId: active.sessionId, entries: cleaned }],
    });
    setActive(null);
    setTab("today");
    flash("Session saved. Good work.");
  };

  const saveRun = () => {
    if (!runForm.km && !runForm.min) { flash("Add a distance or time"); return; }
    persist({ ...data, runs: [...data.runs, { id: uid(), date: new Date().toISOString(), ...runForm }] });
    setRunForm(null);
    flash("Run logged.");
  };

  const deleteItem = (kind, id) => {
    const next = kind === "workout"
      ? { ...data, workouts: data.workouts.filter((w) => w.id !== id) }
      : { ...data, runs: data.runs.filter((r) => r.id !== id) };
    persist(next);
    flash("Deleted.");
  };

  /* block management */
  const setActiveBlock = (id) => {
    persist({ ...data, activeBlockId: id });
    flash("Block activated. Today tab updated.");
  };

  const duplicateBlock = (block) => {
    const copy = JSON.parse(JSON.stringify(block));
    copy.id = uid();
    copy.name = block.name.replace(/ \(draft\)/, "") + " (copy)";
    copy.archived = false;
    persist({ ...data, blocks: [...data.blocks, copy] });
    flash("Block duplicated.");
  };

  const toggleArchive = (block) => {
    if (block.id === data.activeBlockId && !block.archived) {
      flash("Can't archive the active block. Activate another first.");
      return;
    }
    persist({
      ...data,
      blocks: data.blocks.map((b) => (b.id === block.id ? { ...b, archived: !b.archived } : b)),
    });
    flash(block.archived ? "Block restored." : "Block archived. History is kept.");
  };

  const addBlockFromJson = () => {
    try {
      const parsed = JSON.parse(dataModal.text);
      if (!parsed.name || !Array.isArray(parsed.sessions)) throw new Error();
      parsed.sessions.forEach((s) => {
        if (!s.id || !s.name || !Array.isArray(s.exercises)) throw new Error();
        s.exercises.forEach((e) => {
          if (!e.id || !e.name) throw new Error();
          e.sets = e.sets || 3;
          e.scheme = e.scheme || "3 × 8";
          e.rpe = e.rpe || "";
          e.rest = e.rest || "";
          e.note = e.note || "";
        });
      });
      const block = { ...parsed, id: parsed.id && !data.blocks.some((b) => b.id === parsed.id) ? parsed.id : uid(), archived: false };
      persist({ ...data, blocks: [...data.blocks, block] });
      setDataModal(null);
      flash("Block added. Activate it when you're ready.");
    } catch {
      flash("Invalid block JSON — check the format.");
    }
  };

  /* export / import */
  const openExport = () => setDataModal({ mode: "export", text: JSON.stringify(data, null, 1) });
  const openImport = () => setDataModal({ mode: "import", text: "" });
  const openAddBlock = () => setDataModal({ mode: "addblock", text: "" });
  const doImport = () => {
    try {
      const parsed = JSON.parse(dataModal.text);
      if (!Array.isArray(parsed.blocks) || !Array.isArray(parsed.workouts) || !Array.isArray(parsed.runs)) throw new Error();
      persist(parsed);
      setDataModal(null);
      flash("Data restored.");
    } catch {
      flash("That doesn't look like a valid backup.");
    }
  };
  const copyExport = () => {
    try {
      const ta = document.getElementById("export-ta");
      ta.select();
      ta.setSelectionRange(0, 999999);
      document.execCommand("copy");
      flash("Copied — paste it somewhere safe.");
    } catch {
      flash("Select the text and copy manually.");
    }
  };

  /* progress */
  const allExercises = useMemo(() => {
    if (!data) return [];
    const seen = {};
    const list = [];
    data.blocks.forEach((b) => b.sessions.forEach((s) => s.exercises.forEach((e) => {
      if (!seen[e.id]) { seen[e.id] = true; list.push(e); }
    })));
    return list;
  }, [data]);

  const progressSeries = useMemo(() => {
    if (!data) return { points: [], metric: "" };
    const pts = [];
    let weighted = false;
    [...data.workouts].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach((w) => {
      const sets = w.entries[progressEx];
      if (!sets) return;
      let best = 0;
      sets.forEach((s) => {
        const wt = parseFloat(s.w), r = parseFloat(s.r);
        if (wt && r) { weighted = true; best = Math.max(best, epley(wt, r)); }
        else if (r) best = Math.max(best, r);
      });
      if (best) pts.push({ date: w.date, val: best });
    });
    return { points: pts, metric: weighted ? "est. 1RM (kg)" : "best reps / secs" };
  }, [data, progressEx]);

  if (!data) {
    return <div style={sx.shell}><div style={sx.center}>LOADING LOGBOOK…</div></div>;
  }

  const session = active
    ? (data.blocks.find((b) => b.id === active.blockId) || {}).sessions.find((s) => s.id === active.sessionId)
    : null;

  return (
    <div style={sx.shell}>
      <header style={sx.header}>
        <div>
          <div style={sx.eyebrow}>PERSONAL LOGBOOK</div>
          <div style={sx.title}>IRON &amp; TRAIL</div>
        </div>
        <div style={sx.blockTag}>
          <div style={sx.blockTagPhase}>{activeBlock ? activeBlock.name.split("—")[0].trim().toUpperCase() : "NO BLOCK"}</div>
          <div style={sx.blockTagDates}>{activeBlock ? activeBlock.dates : ""}</div>
        </div>
      </header>

      {saveErr && <div style={sx.warn}>Couldn't save — storage may be full or blocked. Export a backup.</div>}

      {active && session ? (
        <ActiveWorkout
          session={session}
          entries={active.entries}
          prev={lastEntriesFor(session.id)}
          onSet={updateSet}
          onAddSet={addSet}
          onFinish={finishWorkout}
          onCancel={() => setActive(null)}
        />
      ) : (
        <React.Fragment>
          {tab === "today" && (
            <Today block={activeBlock} weekStats={weekStats} onStart={startWorkout}
              onLogRun={() => setRunForm({ type: "Zone 2", km: "", min: "", notes: "" })}
              goBlocks={() => setTab("blocks")} />
          )}
          {tab === "blocks" && (
            <Blocks data={data} open={openBlocks} setOpen={setOpenBlocks}
              onActivate={setActiveBlock} onDuplicate={duplicateBlock} onArchive={toggleArchive}
              onAddBlock={openAddBlock} onExport={openExport} onImport={openImport} />
          )}
          {tab === "history" && <History data={data} open={openHistory} setOpen={setOpenHistory} onDelete={deleteItem} />}
          {tab === "progress" && (
            <Progress exercises={allExercises} selected={progressEx} onSelect={setProgressEx} series={progressSeries} />
          )}
        </React.Fragment>
      )}

      {runForm && (
        <div style={sx.modalBack} onClick={() => setRunForm(null)}>
          <div style={sx.modal} onClick={(e) => e.stopPropagation()}>
            <div style={sx.modalTitle}>LOG RUN</div>
            <label style={sx.label}>Type</label>
            <div style={sx.chipRow}>
              {RUN_TYPES.map((t) => (
                <button key={t} style={{ ...sx.chip, ...(runForm.type === t ? sx.chipOn : {}) }}
                  onClick={() => setRunForm({ ...runForm, type: t })}>{t}</button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <label style={sx.label}>Distance (km)</label>
                <input style={sx.input} inputMode="decimal" value={runForm.km}
                  onChange={(e) => setRunForm({ ...runForm, km: e.target.value })} placeholder="0.0" />
              </div>
              <div style={{ flex: 1 }}>
                <label style={sx.label}>Time (min)</label>
                <input style={sx.input} inputMode="decimal" value={runForm.min}
                  onChange={(e) => setRunForm({ ...runForm, min: e.target.value })} placeholder="0" />
              </div>
            </div>
            <label style={sx.label}>Notes</label>
            <input style={sx.input} value={runForm.notes}
              onChange={(e) => setRunForm({ ...runForm, notes: e.target.value })} placeholder="Felt easy, HR 135 avg…" />
            <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
              <button style={sx.btnGhost} onClick={() => setRunForm(null)}>Cancel</button>
              <button style={sx.btnPrimary} onClick={saveRun}>Save run</button>
            </div>
          </div>
        </div>
      )}

      {dataModal && (
        <div style={sx.modalBack} onClick={() => setDataModal(null)}>
          <div style={sx.modal} onClick={(e) => e.stopPropagation()}>
            <div style={sx.modalTitle}>
              {dataModal.mode === "export" ? "BACKUP DATA" : dataModal.mode === "import" ? "RESTORE DATA" : "ADD BLOCK"}
            </div>
            <div style={{ fontSize: 12, color: "#5C6066", lineHeight: 1.5, marginBottom: 10 }}>
              {dataModal.mode === "export" && "Copy this and save it in Notes or email it to yourself. It's your entire logbook."}
              {dataModal.mode === "import" && "Paste a backup below and restore. This replaces everything currently in the app."}
              {dataModal.mode === "addblock" && "Paste a block JSON from your coach. It's added as inactive — activate it when the mesocycle starts."}
            </div>
            <textarea id="export-ta" style={sx.textarea} value={dataModal.text}
              readOnly={dataModal.mode === "export"}
              onChange={(e) => setDataModal({ ...dataModal, text: e.target.value })}
              placeholder={dataModal.mode !== "export" ? "Paste JSON here…" : ""} />
            <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
              <button style={sx.btnGhost} onClick={() => setDataModal(null)}>Close</button>
              {dataModal.mode === "export" && <button style={sx.btnPrimary} onClick={copyExport}>Copy backup</button>}
              {dataModal.mode === "import" && <button style={sx.btnPrimary} onClick={doImport}>Restore</button>}
              {dataModal.mode === "addblock" && <button style={sx.btnPrimary} onClick={addBlockFromJson}>Add block</button>}
            </div>
          </div>
        </div>
      )}

      {toast && <div style={sx.toast}>{toast}</div>}

      {!active && (
        <nav style={sx.nav}>
          {[["today", "Today"], ["blocks", "Blocks"], ["history", "History"], ["progress", "Progress"]].map(([id, label]) => (
            <button key={id} onClick={() => setTab(id)} style={{ ...sx.navBtn, ...(tab === id ? sx.navBtnOn : {}) }}>
              {label}
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

/* ════════════ TODAY ════════════ */

function Stat({ big, small }) {

      <div style={sx.statBig}>{big}</div>
      <div style={sx.statSmall}>{small}</div>

}

/* ════════════ ACTIVE WORKOUT ════════════ */
function ActiveWorkout({ session, entries, prev, onSet, onAddSet, onFinish, onCancel }) {
  const [timeLeft, setTimeLeft] = useState(0);
  const [timerTotal, setTimerTotal] = useState(0);

  useEffect(() => {
    if (timeLeft <= 0) return;
    const t = setTimeout(() => setTimeLeft((x) => x - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft]);

  const startTimer = (secs) => { setTimerTotal(secs); setTimeLeft(secs); };
  const mmss = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;

  return (
    <div style={{ ...sx.page, paddingBottom: 130 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 18 }}>
        <div style={{ ...sx.bib, width: 54, height: 54, fontSize: session.id.length > 1 ? 20 : 28 }}>{session.id}</div>
        <div style={{ flex: 1 }}>
          <div style={sx.sessionName}>{session.name}</div>
          <div style={sx.sessionMeta}>Beat the grey numbers.</div>
        </div>
        <button style={sx.cancelBtn} onClick={onCancel}>✕</button>
      </div>

      {session.exercises.map((ex) => {
        const prevSets = prev && prev[ex.id];
        return (
          <div key={ex.id} style={sx.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <div style={sx.exName}>{ex.name}</div>
              <div style={sx.exScheme}>{ex.scheme}</div>
            </div>
            <div style={sx.exMeta}>{ex.rpe}{ex.rest ? ` · rest ${ex.rest}` : ""}</div>
            {ex.note && <div style={sx.exNote}>{ex.note}</div>}

            <div style={sx.setHeader}>
              <span style={{ width: 26 }}>SET</span>
              <span style={{ flex: 1 }}>PREV</span>
              <span style={{ width: 62, textAlign: "center" }}>KG</span>
              <span style={{ width: 54, textAlign: "center" }}>REPS</span>
              <span style={{ width: 48, textAlign: "center" }}>RPE</span>
              <span style={{ width: 34 }} />
            </div>

            {entries[ex.id].map((set, i) => {
              const p = prevSets && prevSets[i];
              const ghost = p ? `${p.w ? p.w + "×" : ""}${p.r || "—"}${p.rpe ? " @" + p.rpe : ""}` : "—";
              return (
                <div key={i} style={{ ...sx.setRow, ...(set.done ? sx.setRowDone : {}) }}>
                  <span style={sx.setNum}>{i + 1}</span>
                  <span style={sx.ghost}>{ghost}</span>
                  <input style={sx.setInput} inputMode="decimal" value={set.w}
                    placeholder={p && p.w ? p.w : ""} onChange={(e) => onSet(ex.id, i, "w", e.target.value)} />
                  <input style={{ ...sx.setInput, width: 54 }} inputMode="decimal" value={set.r}
                    placeholder={p && p.r ? p.r : ""} onChange={(e) => onSet(ex.id, i, "r", e.target.value)} />
                  <input style={{ ...sx.setInput, width: 48 }} inputMode="decimal" value={set.rpe}
                    placeholder={p && p.rpe ? p.rpe : ""} onChange={(e) => onSet(ex.id, i, "rpe", e.target.value)} />
                  <button style={{ ...sx.doneBtn, ...(set.done ? sx.doneBtnOn : {}) }}
                    onClick={() => onSet(ex.id, i, "done", !set.done)} aria-label="mark set done">✓</button>
                </div>
              );
            })}
            <button style={sx.addSet} onClick={() => onAddSet(ex.id)}>+ add set</button>
          </div>
        );
      })}

      <button style={{ ...sx.btnPrimary, width: "100%", padding: "16px 0", fontSize: 15 }} onClick={onFinish}>
        FINISH SESSION
      </button>

      <div style={sx.timerBar}>
        {timeLeft > 0 ? (
          <React.Fragment>
            <div style={{ ...sx.timerClock, color: timeLeft <= 10 ? "#F04E12" : "#F3F3EF" }}>{mmss(timeLeft)}</div>
            <div style={sx.timerTrack}>
              <div style={{ ...sx.timerFill, width: `${(timeLeft / timerTotal) * 100}%` }} />
            </div>
            <button style={sx.timerCancel} onClick={() => setTimeLeft(0)}>✕</button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <span style={sx.timerLabel}>REST</span>
            {[60, 90, 120, 180].map((s) => (
              <button key={s} style={sx.timerBtn} onClick={() => startTimer(s)}>{mmss(s)}</button>
            ))}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ════════════ BLOCKS (mesocycle management) ════════════ */
function Blocks({ data, open, setOpen, onActivate, onDuplicate, onArchive, onAddBlock, onExport, onImport }) {
  const activeFirst = [...data.blocks].sort((a, b) =>
    (a.id === data.activeBlockId ? -1 : 0) - (b.id === data.activeBlockId ? -1 : 0) || (a.archived ? 1 : 0) - (b.archived ? 1 : 0)
  );

  return (
    <div style={sx.page}>
      <div style={sx.phaseNote}>
        Your training blocks (mesocycles). One is active at a time — it drives the Today tab.
        History and progress carry across blocks, so a trap bar pull in Block 2 continues the Block 1 trend line.
      </div>

      {activeFirst.map((b) => {
        const isActive = b.id === data.activeBlockId;
        const count = data.workouts.filter((w) => w.blockId === b.id).length;
        return (
          <div key={b.id} style={{ ...sx.card, ...(b.archived ? { opacity: 0.55 } : {}), ...(isActive ? { border: "1.5px solid #17191C" } : {}) }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <div style={{ ...sx.exName, fontSize: 16 }}>{b.name}</div>
                  {isActive && <span style={sx.badgeActive}>ACTIVE</span>}
                  {b.archived && <span style={sx.badgeArchived}>ARCHIVED</span>}
                </div>
                <div style={{ ...sx.exMeta, marginTop: 4 }}>{b.dates} · {b.sessions.length} sessions · {count} logged</div>
                <div style={sx.exNote}>{b.phase}</div>
              </div>
            </div>

            <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
              {!isActive && !b.archived && (
                <button style={sx.miniBtnPrimary} onClick={() => onActivate(b.id)}>Make active</button>
              )}
              <button style={sx.miniBtn} onClick={() => setOpen({ ...open, [b.id]: !open[b.id] })}>
                {open[b.id] ? "Hide sessions" : "View sessions"}
              </button>
              <button style={sx.miniBtn} onClick={() => onDuplicate(b)}>Duplicate</button>
              <button style={sx.miniBtn} onClick={() => onArchive(b)}>{b.archived ? "Restore" : "Archive"}</button>
            </div>

            {open[b.id] && (
              <div style={{ marginTop: 12, borderTop: "1px solid #E4E3DD", paddingTop: 6 }}>
                {b.sessions.map((s) => (
                  <div key={s.id}>
                    <div style={{ ...sx.exMeta, marginTop: 10, fontWeight: 700, color: "#17191C" }}>
                      {s.id} · {s.name} · {s.day}
                    </div>
                    {s.exercises.map((ex) => (
                      <div key={ex.id} style={sx.programRow}>
                        <div style={{ fontSize: 13, fontWeight: 600 }}>{ex.name}</div>
                        <div style={{ ...sx.programScheme, fontSize: 12 }}>
                          {ex.scheme}<span style={{ color: "#82868D" }}> {ex.rpe}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}

      <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
        <button style={sx.btnGhost} onClick={onAddBlock}>+ Add block</button>
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
        <button style={sx.btnGhost} onClick={onExport}>Backup data</button>
        <button style={sx.btnGhost} onClick={onImport}>Restore data</button>
      </div>
      <div style={{ ...sx.phaseNote, marginTop: 12 }}>
        Deload: every 4th week of the active block, drop lifting to 2 sets per exercise at RPE 6.
        Review the block with your coach every 8 weeks — bring the History tab.
      </div>
    </div>
  );
}

/* ════════════ HISTORY ════════════ */
function History({ data, open, setOpen, onDelete }) {
  const items = useMemo(() => {
    const w = data.workouts.map((x) => ({ ...x, kind: "workout" }));
    const r = data.runs.map((x) => ({ ...x, kind: "run" }));
    return [...w, ...r].sort((a, b) => new Date(b.date) - new Date(a.date));
  }, [data]);

  const lookup = (blockId, sessionId) => {
    const b = data.blocks.find((b) => b.id === blockId);
    const s = b && b.sessions.find((s) => s.id === sessionId);
    return { session: s, exName: (exId) => {
      const e = s && s.exercises.find((e) => e.id === exId);
      return e ? e.name : exId;
    }};
  };

  if (!items.length) {
    return (
      <div style={sx.page}>
        <div style={{ ...sx.card, textAlign: "center", color: "#82868D", padding: 40 }}>
          Nothing logged yet. Start a session — the logbook fills itself.
        </div>
      </div>
    );
  }

  return (
    <div style={sx.page}>
      {items.map((it) => {
        if (it.kind === "run") {
          return (
            <div key={it.id} style={sx.card}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ ...sx.bib, width: 34, height: 34, fontSize: 15, borderColor: "#F04E12", color: "#F04E12" }}>R</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>
                    {it.type} {it.km ? `· ${it.km} km` : ""} {it.min ? `· ${it.min} min` : ""}
                  </div>
                  <div style={sx.exMeta}>{fmtDate(it.date)}{it.notes ? ` — ${it.notes}` : ""}</div>
                </div>
                <button style={sx.delBtn} onClick={() => onDelete("run", it.id)}>del</button>
              </div>
            </div>
          );
        }
        const { session, exName } = lookup(it.blockId, it.sessionId);
        return (
          <div key={it.id} style={sx.card}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, cursor: "pointer" }}
              onClick={() => setOpen({ ...open, [it.id]: !open[it.id] })}>
              <div style={{ ...sx.bib, width: 34, height: 34, fontSize: it.sessionId.length > 1 ? 12 : 15 }}>{it.sessionId}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 14 }}>{session ? session.name : `Session ${it.sessionId}`}</div>
                <div style={sx.exMeta}>{fmtDate(it.date)} · {Object.keys(it.entries).length} exercises</div>
              </div>
              <span style={{ color: "#82868D", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12 }}>
                {open[it.id] ? "▲" : "▼"}
              </span>
            </div>
            {open[it.id] && (
              <div style={{ marginTop: 12, borderTop: "1px solid #E4E3DD", paddingTop: 10 }}>
                {Object.entries(it.entries).map(([exId, sets]) => (
                  <div key={exId} style={sx.programRow}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{exName(exId)}</div>
                    <div style={{ ...sx.programScheme, fontSize: 12 }}>
                      {sets.map((s, i) => (
                        <span key={i}>
                          {s.w ? `${s.w}×` : ""}{s.r || "—"}{s.rpe ? `@${s.rpe}` : ""}{i < sets.length - 1 ? "  " : ""}
                        </span>
                      ))}
                    </div>
                  </div>
                ))}
                <button style={{ ...sx.delBtn, marginTop: 8 }} onClick={() => onDelete("workout", it.id)}>
                  delete session
                </button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ════════════ PROGRESS ════════════ */
function Progress({ exercises, selected, onSelect, series }) {
  const pts = series.points;
  const last = pts[pts.length - 1];
  const first = pts[0];
  const delta = last && first && pts.length > 1 ? last.val - first.val : null;

  return (
    <div style={sx.page}>
      <div style={sx.chipRow}>
        {exercises.map((ex) => (
          <button key={ex.id}
            style={{ ...sx.chip, ...(selected === ex.id ? sx.chipOn : {}) }}
            onClick={() => onSelect(ex.id)}>{ex.name}</button>
        ))}
      </div>

      <div style={sx.card}>
        {pts.length === 0 ? (
          <div style={{ color: "#82868D", textAlign: "center", padding: 30, fontSize: 14 }}>
            No data yet for this exercise. Log a session and the trend appears here.
          </div>
        ) : (
          <React.Fragment>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <div>
                <div style={sx.statBig}>{last.val.toFixed(1)}</div>
                <div style={sx.statSmall}>{series.metric.toUpperCase()}</div>
              </div>
              {delta !== null && (
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 700, color: delta >= 0 ? "#23794B" : "#F04E12" }}>
                  {delta >= 0 ? "▲" : "▼"} {Math.abs(delta).toFixed(1)} all-time
                </div>
              )}
            </div>
            <Chart points={pts} />
            <div style={{ marginTop: 14 }}>
              {[...pts].reverse().slice(0, 6).map((p, i) => (
                <div key={i} style={sx.programRow}>
                  <span style={{ fontSize: 13, color: "#82868D" }}>{fmtDate(p.date)}</span>
                  <span style={{ ...sx.programScheme, fontSize: 13 }}>{p.val.toFixed(1)}</span>
                </div>
              ))}
            </div>
          </React.Fragment>
        )}
      </div>
      <div style={sx.phaseNote}>
        Estimated 1RM uses the Epley formula from your best set. Trends span all blocks —
        the long game in one line. During the ultra block, flat is winning.
      </div>
    </div>
  );
}

function Chart({ points }) {
  const W = 320, H = 120, PAD = 10;
  const vals = points.map((p) => p.val);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const x = (i) => points.length === 1 ? W / 2 : PAD + (i / (points.length - 1)) * (W - PAD * 2);
  const y = (v) => H - PAD - ((v - min) / range) * (H - PAD * 2);
  const path = points.map((p, i) => `${i === 0 ? "M" : "L"}${x(i)},${y(p.val)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", marginTop: 12 }}>
      <path d={path} fill="none" stroke="#F04E12" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => <circle key={i} cx={x(i)} cy={y(p.val)} r="3.5" fill="#17191C" />)}
    </svg>
  );
}
